<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Загрузочний екран DGP Sandbox</title>
</head>
<style>
    body {
        background-color: black;
    }

    section {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100vh;
        background-image: url("images/image5.png");
        background-color: black;
        background-repeat: no-repeat;
        background-size: cover;
        background-position: center;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .loader {
        border: 4px solid #ffffff; /* Light grey */
        border-top: 4px solid #3498db; /* Blue */
        border-radius: 50%;
        width: 16px;
        height: 16px;
        position: absolute;
        top: 379px;
        left: 1153px;
        animation: spin 2s linear infinite;
    }

    @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
    }

    .vignette {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    box-shadow: 0 0 200px rgba(0,0,0,0.9) inset;
    }

    section img {
        position: absolute;
            top: 310px;
            left: 30%;
            width: 100%;
            height: 100vh;
    }

    h1 {
        font-family: 'Oswald', sans-serif;
        font-weight: 700;
        font-size: 30px;
        color: rgb(255, 255, 255);
        position: absolute;
        top: 350px;
        left: 873px;
        text-shadow: 2px 2px 4px #000000;
    }
</style>
<body>
<section>
    <h1>Ласкаво просимо!</h1> <span class="loader"></span>
    <img src="biglogo.png" alt="DGP Sandbox" style="width:720px;height:280px;"> 
    <div class="vignette"></div>
</section>
    <script>
    const GITHUB_USER = 'dmaydanik8';
    const GITHUB_REPO = 'dmaydanik8.github.io';
    const GITHUB_BRANCH = 'main';

    const section = document.querySelector('section');

    fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/images?ref=${GITHUB_BRANCH}`)
        .then(res => res.json())
        .then(files => {
            const images = files
                .filter(f => f.name.match(/\.(png|jpg|jpeg|webp)$/i))
                .map(f => `url("${f.download_url}")`);

            function changeBg() {
                section.style.backgroundImage = images[Math.floor(Math.random() * images.length)];
            }

            changeBg();
            setInterval(changeBg, 5);
        });
</script>
</body>
</html>
