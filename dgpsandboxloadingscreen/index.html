<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css?family=Ubuntu|Ubuntu+Condensed|Ubuntu+Mono&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/main.css" />
    <title>DGP Sandbox</title>
    <style>
      body {
        background-repeat: no-repeat;
        background-size: cover;
      }

      @keyframes walk {
        from { transform: rotateZ(0deg); }
        to   { transform: rotateZ(360deg); }
      }

      .walk {
        position: absolute;
        bottom: 16px;
        left: 16px;
        animation: walk 10s linear infinite;
        background-color: #fe7;
        width: 24px;
        height: 24px;
        color: #999;
        font-size: 16px;
        font-family: arial;
        font-weight: bold;
        border-radius: 3px;
        display: inline-block;
        border: 2px solid #999;
      }
    </style>
  </head>
  <body>
    <div class="overhaul"></div>

    <nav>
      <span id="map">Мапа на сервері: </span>
    </nav>

    <main>
      <div class="title">
        <h2>Ласкаво просимо на</h2>
        <h1 id="title"></h1>
        <div id="history"></div>
      </div>
    </main>

    <div class="walk">:v</div>

    <script src="js/lib/jquery-3.4.1.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/main.js"></script>

    <script>
      const images = Array.from({length: 15}, (_, i) => `url("images/${i + 1}.${i >= 6 ? 'jpg' : 'png'}")`);

      setInterval(() => {
        document.body.style.backgroundImage = images[Math.floor(Math.random() * images.length)];
      }, 5000);
    </script>
  </body>
</html>
